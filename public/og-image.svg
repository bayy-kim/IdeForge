<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0d14"/>

  <!-- Grid lines (Blueprint-grid style) -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1c2330" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="30%" r="50%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#a3e635" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a0d14" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Grid fill -->
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Glow overlay -->
  <circle cx="600" cy="200" r="500" fill="url(#glow)"/>

  <!-- Connections / Mindmap decoration -->
  <g stroke="#232b38" stroke-width="2" stroke-dasharray="6 4" opacity="0.6">
    <line x1="200" y1="150" x2="350" y2="250" />
    <line x1="350" y1="250" x2="300" y2="450" />
    <line x1="350" y1="250" x2="600" y2="250" />
    <line x1="600" y1="250" x2="850" y2="250" />
    <line x1="850" y1="250" x2="1000" y2="150" />
    <line x1="850" y1="250" x2="900" y2="450" />
  </g>

  <!-- Nodes -->
  <!-- Center/Main Node (IdeForge Logo area) -->
  <g transform="translate(600, 250)">
    <!-- Main connector node shadow/glow -->
    <rect x="-220" y="-70" width="440" height="120" rx="20" fill="#12161f" stroke="#a3e635" stroke-width="3" filter="drop-shadow(0px 0px 20px rgba(163, 230, 53, 0.2))"/>
    
    <!-- Logo text -->
    <text x="0" y="8" font-family="'Space Grotesk', system-ui, sans-serif" font-size="54" font-weight="bold" text-anchor="middle">
      <tspan fill="#e9ecf3">idē</tspan><tspan fill="#a3e635">forge</tspan>
    </text>
    
    <rect x="-80" y="32" width="160" height="24" rx="12" fill="#a3e635" fill-opacity="0.1" stroke="#a3e635" stroke-width="1" stroke-opacity="0.3"/>
    <text x="0" y="47" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="bold" fill="#a3e635" letter-spacing="2" text-anchor="middle">
      PLANNER AI
    </text>
  </g>

  <!-- Left Node (Idea) -->
  <g transform="translate(200, 150)">
    <circle r="40" fill="#12161f" stroke="#4fd1c5" stroke-width="2"/>
    <text x="0" y="6" font-family="'Space Grotesk', system-ui, sans-serif" font-size="16" font-weight="bold" fill="#e9ecf3" text-anchor="middle">Ide</text>
  </g>

  <!-- Left-Bottom Node (Tech Stack) -->
  <g transform="translate(300, 450)">
    <rect x="-70" y="-25" width="140" height="50" rx="10" fill="#12161f" stroke="#4fd1c5" stroke-width="1.5"/>
    <text x="0" y="5" font-family="'Space Grotesk', system-ui, sans-serif" font-size="14" font-weight="semibold" fill="#e9ecf3" text-anchor="middle">Tech Stack</text>
  </g>

  <!-- Right Node (PRD) -->
  <g transform="translate(1000, 150)">
    <circle r="40" fill="#12161f" stroke="#4fd1c5" stroke-width="2"/>
    <text x="0" y="6" font-family="'Space Grotesk', system-ui, sans-serif" font-size="16" font-weight="bold" fill="#e9ecf3" text-anchor="middle">PRD</text>
  </g>

  <!-- Right-Bottom Node (Prompt) -->
  <g transform="translate(900, 450)">
    <rect x="-75" y="-25" width="150" height="50" rx="10" fill="#12161f" stroke="#a3e635" stroke-width="1.5"/>
    <text x="0" y="5" font-family="'Space Grotesk', system-ui, sans-serif" font-size="14" font-weight="semibold" fill="#e9ecf3" text-anchor="middle">Final Prompt</text>
  </g>

  <!-- Tagline below main node -->
  <text x="600" y="440" font-family="'Inter', system-ui, sans-serif" font-size="24" fill="#7c8598" text-anchor="middle">
    Ubah ide aplikasi kamu jadi rencana teknis lengkap, otomatis dibantu AI.
  </text>
  
  <text x="600" y="480" font-family="'JetBrains Mono', monospace" font-size="14" fill="#4fd1c5" letter-spacing="1" text-anchor="middle">
    ide-forge.vercel.app
  </text>
</svg>
